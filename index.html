<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rabies Case Surveillance Database</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f6f8ef;
color:#234;
}

header{
background:#2f855a;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:1400px;
margin:auto;
padding:25px;
}

.card{
background:#fffdf4;
padding:25px;
margin-bottom:30px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.section-title{
background:#dfead0;
padding:14px;
border-radius:10px;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
}

input,select{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid #ccc;
}

.checkgroup{
background:#f3f8ea;
padding:12px;
border-radius:10px;
}

.checkgroup label{
font-weight:normal;
display:block;
margin:6px 0;
}

.buttons{
margin-top:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

button{
padding:14px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.addbtn{
background:#2f855a;
color:white;
}

.savebtn{
background:#d8c89c;
}

.deletebtn{
background:#c54d4d;
color:white;
padding:8px 14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#2f855a;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
vertical-align:top;
}

tr:nth-child(even){
background:#f8fbf1;
}

.tablewrap{
overflow:auto;
max-height:600px;
}

</style>
</head>
<body>

<header>
<h1>Rabies Case Surveillance Database</h1>
</header>


<div class="container">

<div class="card">
<div class="section-title">
Patients Information
</div>

<div class="grid">

<div>
<label>Name</label>
<input id="patientName">
</div>

<div>
<label>Sex</label>
<select id="sex">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div>
<label>Age</label>
<input type="number" id="age">
</div>

<div>
<label>Socioeconomic Status</label>
<select id="income">
<option>High income</option>
<option>Middle income</option>
<option>Low income</option>
</select>
</div>

<div style="grid-column:span 2;">
<label>Address</label>
<input id="address">
</div>

</div>
</div>



<div class="card">
<div class="section-title">
Animal Bite Information
</div>

<div class="grid">

<div>
<label>Previous Anti-rabies Vaccination</label>
<select id="prevVac">
<option>None</option>
<option>Incomplete</option>
<option>Complete</option>
</select>
</div>

<div>
<label>If complete state date/year</label>
<input id="completeDate">
</div>

<div>
<label>Source of Bite</label>
<input id="biteSource">
</div>

<div>
<label>Type of Ownership</label>
<select id="ownership">
<option>Pet</option>
<option>Stray</option>
<option>Wild</option>
</select>
</div>

<div>
<label>Type of Wound</label>
<input id="woundType">
</div>

<div>
<label>Wound Location</label>
<input id="woundLocation">
</div>

<div>
<label>Type of Bleeding</label>
<input id="bleeding">
</div>

<div>
<label>Wound Care</label>
<select id="woundCare">
<option>Done</option>
<option>Not done</option>
</select>
</div>

<div>
<label>Status of Biting Animal</label>

<div class="checkgroup">
<label><input type="checkbox" value="Alive"> Alive</label>
<label><input type="checkbox" value="Died"> Died</label>
<label><input type="checkbox" value="Vaccinated"> Vaccinated</label>
<label><input type="checkbox" value="Unvaccinated"> Unvaccinated</label>
</div>

</div>

<div>
<label>Consultation Time</label>
<select id="consult">
<option>Within 24 hrs</option>
<option>Within 1 week</option>
<option>After 1 month-year</option>
<option>More than a year</option>
</select>
</div>

<div>
<label>1st Dose</label>
<input type="date" id="dose1">
</div>

<div>
<label>2nd Dose</label>
<input type="date" id="dose2">
</div>

<div>
<label>3rd Dose</label>
<input type="date" id="dose3">
</div>

<div>
<label>Booster</label>
<input type="date" id="booster">
</div>

</div>

<div class="buttons">
<button type="button"
class="addbtn"
onclick="addCase()">
Add Case
</button>

<button type="button"
class="savebtn"
onclick="downloadBackup()">
Save Monthly File
</button>

</div>

</div>


<div class="card">
<div class="section-title">
Case Database
</div>

<div class="tablewrap">
<table>
<thead>

<tr>
<th>Patient</th>
<th>Bite Details</th>
<th>Animal Status</th>
<th>Vaccine Schedule</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="dbBody"></tbody>

</table>
</div>

</div>

</div>


<script>

let cases=
JSON.parse(localStorage.getItem("rabiesDB")) || [];


function saveCases(){
localStorage.setItem(
"rabiesDB",
JSON.stringify(cases)
);
}


function getAnimalStatus(){

let checked=
document.querySelectorAll(
".checkgroup input:checked"
);

let arr=[];

checked.forEach(c=>{
arr.push(c.value);
});

return arr.join(", ");
}



function clearForm(){

document.querySelectorAll(
"input"
).forEach(x=>{

if(x.type!="checkbox"){
x.value="";
}

});

document.querySelectorAll(
"input[type='checkbox']"
).forEach(c=>{
c.checked=false;
});

document.getElementById("sex").selectedIndex=0;
document.getElementById("income").selectedIndex=0;
document.getElementById("prevVac").selectedIndex=0;
document.getElementById("ownership").selectedIndex=0;
document.getElementById("woundCare").selectedIndex=0;
document.getElementById("consult").selectedIndex=0;

}



function addCase(){

let pname=
document.getElementById(
"patientName"
).value.trim();

if(pname===""){
alert("Enter patient name.");
return;
}

let record={

id:Date.now(),

name:pname,

sex:
document.getElementById(
"sex").value,

age:
document.getElementById(
"age").value,

income:
document.getElementById(
"income").value,

address:
document.getElementById(
"address").value,

prevVac:
document.getElementById(
"prevVac").value,

completeDate:
document.getElementById(
"completeDate").value,

biteSource:
document.getElementById(
"biteSource").value,

ownership:
document.getElementById(
"ownership").value,

woundType:
document.getElementById(
"woundType").value,

woundLocation:
document.getElementById(
"woundLocation").value,

bleeding:
document.getElementById(
"bleeding").value,

woundCare:
document.getElementById(
"woundCare").value,

animalStatus:
getAnimalStatus(),

consult:
document.getElementById(
"consult").value,

dose1:
document.getElementById(
"dose1").value,

dose2:
document.getElementById(
"dose2").value,

dose3:
document.getElementById(
"dose3").value,

booster:
document.getElementById(
"booster").value

};


cases.push(record);

saveCases();

renderDatabase();

clearForm();

alert("Case added successfully.");

}



function deleteCase(id){

if(confirm("Delete this case?")){

cases=
cases.filter(
x=>x.id!==id
);

saveCases();

renderDatabase();

}

}



function renderDatabase(){

let html="";

cases.forEach(c=>{

html+=`

<tr>

<td>
<b>${c.name}</b><br>
${c.sex}<br>
Age: ${c.age}<br>
${c.income}<br>
${c.address}
</td>

<td>
Source: ${c.biteSource}<br>
Ownership: ${c.ownership}<br>
Wound: ${c.woundType}<br>
Location: ${c.woundLocation}<br>
Bleeding: ${c.bleeding}<br>
Care: ${c.woundCare}<br>
Previous Vaccine: ${c.prevVac}
</td>

<td>
${c.animalStatus}<br><br>
${c.consult}
</td>

<td>
<b>1st Dose</b><br>

<input class='editbox'

type='date'

value='${c.dose1||""}'

onchange='updateField(${c.id},"dose1",this.value)'>


<select class='smallselect'

onchange='updateField(${c.id},"dose1Remark",this.value)'>

<option ${c.dose1Remark==='Given'?'selected':''}>Given</option>

<option ${c.dose1Remark==='Not Given'?'selected':''}>Not Given</option>

</select>

<hr>

<b>2nd Dose</b><br>

<input class='editbox'

type='date'

value='${c.dose2||""}'

onchange='updateField(${c.id},"dose2",this.value)'>

<select class='smallselect'

onchange='updateField(${c.id},"dose2Remark",this.value)'>

<option ${c.dose2Remark==='Given'?'selected':''}>Given</option>

<option ${c.dose2Remark==='Not Given'?'selected':''}>Not Given</option>

</select>

<hr>

<b>3rd Dose</b><br>

<input class='editbox'

type='date'

value='${c.dose3||""}'

onchange='updateField(${c.id},"dose3",this.value)'>

<select class='smallselect'

onchange='updateField(${c.id},"dose3Remark",this.value)'>

<option ${c.dose3Remark==='Given'?'selected':''}>Given</option>

<option ${c.dose3Remark==='Not Given'?'selected':''}>Not Given</option>

</select>

<hr>

<b>Booster</b><br>

<input class='editbox'

type='date'

value='${c.booster||""}'

onchange='updateField(${c.id},"booster",this.value)'>


<br><br>

Compliance:

<select class='smallselect'

onchange='updateField(${c.id},"compliance",this.value)'>

<option ${c.compliance==='Compliant'?'selected':''}>Compliant</option>

<option ${c.compliance==='Non-Compliant'?'selected':''}>Non-Compliant</option>

</select>

</td>

<td>
<button
class="deletebtn"
onclick="deleteCase(${c.id})">
Delete
</button>
</td>

</tr>

`;

});

document.getElementById(
"dbBody"
).innerHTML=html;

}



function downloadBackup(){

let blob=
new Blob(
[JSON.stringify(cases,null,2)],
{type:"application/json"}
);

let a=
document.createElement("a");

let month=
new Date().toLocaleString(
'default',
{month:'long'}
);

let year=
new Date().getFullYear();

a.href=
URL.createObjectURL(blob);

a.download=
"Rabies_Backup_"+month+"_"+year+".json";

a.click();

}



renderDatabase();

</script>

</body>
</html>
